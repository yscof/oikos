name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # AGP 9 필수 — Flutter 액션만으로는 JDK가 보장되지 않는다.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --release

      # 안드로이드 기기 사이드로드 테스트용
      - uses: actions/upload-artifact@v4
        with:
          name: oikos-apk
          path: build/app/outputs/flutter-apk/app-release.apk
